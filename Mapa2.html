<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venezuela - Región Pokémon</title>
    
    <!-- Fuente estilo 8-bits de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #1a252f; /* Fondo oscuro alrededor de la "consola" */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', cursive;
        }

        /* Pantalla del juego */
        #game-screen {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #3498db; /* Color de océano base */
            border: 8px solid #bdc3c7;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* IMAGEN DEL MAPA (¡Ahora sí se verá!) */
        #venezuela-map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta la imagen al cuadro */
            z-index: 1; /* Nivel 1: Al fondo */
        }

        /* Estilo para los lugares (Sprites/Emojis) */
        .sprite {
            position: absolute;
            font-size: 35px; /* Tamaño del icono */
            cursor: pointer;
            transition: transform 0.1s;
            text-shadow: 2px 2px 0px #000; /* Borde oscuro para que resalte sobre el mapa */
            z-index: 2; /* Nivel 2: Sobre el mapa */
            /* Animación de "respiración" para que parezcan vivos */
            animation: float 2s infinite ease-in-out;
        }

        .sprite:hover {
            transform: scale(1.3) translateY(-5px);
            animation: none; /* Se detiene al pasar el mouse */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Caja de diálogo estilo Pokémon */
        #dialog-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 110px;
            background-color: #f8f9fa;
            border: 6px solid #2c3e50;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            display: none; /* Oculto hasta hacer clic */
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
            z-index: 3; /* Nivel 3: Por encima de TODO */
            cursor: pointer;
        }

        /* Triangulito rojo de continuar */
        #dialog-box::after {
            content: '▼';
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 14px;
            color: #c0392b;
            animation: blink 1s infinite;
        }

        #dialog-text {
            font-size: 12px;
            line-height: 1.8;
            color: #2c3e50;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-screen">
        
        <!-- MAPA DE RELIEVE DE VENEZUELA (Enlace súper seguro) -->
        <img id="venezuela-map" src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Relief_Map_of_Venezuela.jpg/800px-Relief_Map_of_Venezuela.jpg" alt="Mapa de Venezuela">

        <!-- SPRITES -->
        <!-- Salto Ángel -->
        <div class="sprite" style="top: 60%; left: 65%;" onclick="mostrarDialogo('¡Has encontrado el SALTO ÁNGEL! La cascada más alta del mundo... Se siente una energía mística en el ambiente.')">
            🌊
        </div>

        <!-- Relámpagos del Catatumbo -->
        <div class="sprite" style="top: 25%; left: 22%;" onclick="mostrarDialogo('¡Cuidado! Zona de los RELÁMPAGOS DEL CATATUMBO. Las tormentas eléctricas aquí no se detienen nunca.')">
            ⚡
        </div>

        <!-- Médanos de Coro -->
        <div class="sprite" style="top: 8%; left: 42%;" onclick="mostrarDialogo('Has llegado a los MÉDANOS DE CORO. Un desierto abrasador. La arena cambia de lugar con el viento... necesitas agua para cruzar.')">
            🏜️
        </div>

        <!-- Monte Roraima -->
        <div class="sprite" style="top: 72%; left: 82%;" onclick="mostrarDialogo('Este es el MONTE RORAIMA. Un tepuy milenario. El terreno parece sacado de la prehistoria.')">
            ⛰️
        </div>

        <!-- Caja de texto -->
        <div id="dialog-box" onclick="cerrarDialogo()">
            <div id="dialog-text"></div>
        </div>

    </div>

    <script>
        let intervalId;

        function mostrarDialogo(texto) {
            const dialogBox = document.getElementById('dialog-box');
            const dialogText = document.getElementById('dialog-text');
            
            dialogBox.style.display = 'block';
            dialogText.innerHTML = ''; 
            
            if (intervalId) clearInterval(intervalId);

            let i = 0;
            intervalId = setInterval(function() {
                if (i < texto.length) {
                    dialogText.innerHTML += texto.charAt(i);
                    i++;
                } else {
                    clearInterval(intervalId); 
                }
            }, 35); // Velocidad de las letras
        }

        function cerrarDialogo() {
            document.getElementById('dialog-box').style.display = 'none';
        }
    </script>

</body>
</html>
